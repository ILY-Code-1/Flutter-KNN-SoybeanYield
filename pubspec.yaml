name: flutter_knn_soybean
description: "SoyBeanYield - Soybean Harvest Prediction App using KNN method."
publish_to: 'none'

version: 1.0.3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  file_picker: ^8.1.2
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.webp"
  # Warna background icon Android adaptive (format hex, tanpa #).
  # Ganti sesuai warna brand kamu jika ingin background berbeda.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.webp"
  # Ukuran padding foreground adaptive icon Android (0.0 = full, 1.0 = sangat kecil).
  # Naikkan nilai ini jika logo terpotong di perangkat Android.
  adaptive_icon_foreground_padding: 0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - soybean_yield_dataset.txt
